# packages.yaml — Concept Package Reference
# List packages this concept requires or recommends.
# This file is currently documentation for maintainers; the bootstrap script
# installs its own hard-coded defaults and does not read this file.

required:
  # Packages that must be installed for any quest to function.
  # Keep this list short — only hard dependencies.
  - git
  - curl

optional:
  # Packages that enhance the experience but aren't required for core quests.
  # Players can install these as quests unlock them.
  - vim
  - python
  - openssh

# Add new packages here as quests require them.
# Group by arc if the list grows large.
